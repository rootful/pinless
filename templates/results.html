<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinless</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%221em%22 font-size=%2280%22>📌</text></svg>">
    <style>
        body {
            background: #121212;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: sans-serif;
            scrollbar-color: gray #121212;
        }

        .grid-container {
            columns: 5 200px;
            column-gap: 1.5rem;
            width: 90%;
            margin: 0 auto;
        }

        .grid-container div {
            width: 150px;
            margin: 0 1.5rem 1.5rem 0;
            display: inline-block;
            width: 100%;
            padding: 5px;
            border-radius: 16px;
            overflow: hidden;
        }

        .grid-container div img {
            width: 100%;
            border-radius: 16px;
            display: block;
        }

        input#search {
            all: unset;
            background: #222;
            color: #fff;
            padding: 0.7rem 1rem;
            border-radius: 24px;
            width: 100%;
        }

        input#search:-webkit-autofill,
        input#search:-webkit-autofill:hover,
        input#search:-webkit-autofill:focus,
        input#search:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #222 inset !important;
            -webkit-text-fill-color: #fff !important;
        }

        .search-container {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 100vw;
            gap: 1rem;
            width: 90%;
            margin: 0 auto;
            margin-bottom: 20px;
        }

        .search {
            max-width: 500px;
            width: 100%;
            position: relative;
            display: flex;
        }

        button[type="submit"] {
            all: unset;
            position: absolute;
            right: 4px;
            top: 5px;
            height: 30px;
            width: 30px;
            color: #e60023;
            background-color: #222;
            cursor: pointer;
            border-radius: 50%;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .logo-full {
            display: inline;
        }
        .logo-short {
            display: none;
        }
        @media (max-width: 600px) {
            .logo-full {
                display: none;
            }
            .logo-short {
                display: inline;
            }
        }

        .pagination-container a {
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="search-container">
        <h1><a href="/"><span class="logo-short">P</span><span class="logo-full">Pinless</span></a></h1>
        <form action="/search/pins/" method="GET" class="search">
            <input id="search" type="text" name="q" placeholder="Search for the cute cats, memes, etc."
                required />
            <button type="submit"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-search">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.3-4.3" />
                </svg></button>
        </form>
    </div>

    <div class="grid-container">
        {{range .Results}}
        <div>
            <a href="/pin/{{.ID}}?csrftoken={{ $.CSRFToken | urlquery }}&q={{ $.Query | urlquery }}">
                <img src="{{.Image}}" alt="Image" />
            </a>
        </div>
        {{end}}
    </div>

    {{ if .Bookmark }}
    <div class="pagination-container">
        <h2 style="text-align: center;">
            <a href="/search/pins/?q={{ .Query | urlquery }}&bookmark={{ .Bookmark | urlquery }}&csrftoken={{ .CSRFToken | urlquery }}">Next page</a>
        </h2>
    </div>
    {{ end }}
</body>

</html>
